# Docker service DNS is resolvable only at runtime; use a variable + resolver so
# nginx starts even if an upstream is briefly down (otherwise it fails on boot).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ZIP submission uploads.
    client_max_body_size 50m;

    # SPA: never cache the shell so clients always pick up new hashed asset names
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Comprimir respuestas
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # ---- API edge proxy: single origin, internal-only microservice ports ----
    # Prefix -> service (no trailing slash: must also match e.g. /api/challenges).
    # proxy_pass with a variable does no URI rewriting; $request_uri forwards the
    # full original path+query, so backends keep their /api/... routes verbatim.
    location /api/auth         { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/groups       { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/friends      { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/challenges   { set $u http://apiarena-challenge:8082;   proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/categories   { set $u http://apiarena-challenge:8082;   proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/leaderboard  { set $u http://apiarena-leaderboard:8087; proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/notifications { set $u http://apiarena-notification:8090; proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/metrics      { set $u http://apiarena-metrics:8089;     proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }

    # Submissions: bigger bodies + slow grading runs.
    location /api/submissions  {
        set $u http://apiarena-submission:8083;
        proxy_pass $u$request_uri;
        include /etc/nginx/api_proxy.conf;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Notifications WebSocket.
    location /ws/notifications {
        set $u http://apiarena-notification:8090;
        proxy_pass $u$request_uri;
        include /etc/nginx/api_proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
