# Docker service DNS is resolvable only at runtime; use a variable + resolver so
# nginx starts even if an upstream is briefly down (otherwise it fails on boot).
resolver 127.0.0.11 valid=10s ipv6=off;

# Edge rate limit (Phase 2): additive abuse buffer in front of the JVM services,
# on top of (not replacing) the per-route Redis limiters in auth/submission.
# This file is included inside the stock nginx http{} block, so http-context
# directives like limit_req_zone belong here next to resolver.
# Keyed on $binary_remote_addr (direct origin abuse). If NPM/Cloudflare double-proxy
# and you need the real client IP, add set_real_ip_from for the proxy subnet later.
# ponytail: 40r/s burst 80 hardcoded; expose via env only if a real tune is needed.
limit_req_zone $binary_remote_addr zone=api_edge:10m rate=40r/s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ZIP submission uploads.
    client_max_body_size 50m;

    # SPA: never cache the shell so clients always pick up new hashed asset names
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Comprimir respuestas
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # ---- API edge proxy: single origin, internal-only microservice ports ----
    # Prefix -> service (no trailing slash: must also match e.g. /api/challenges).
    # proxy_pass with a variable does no URI rewriting; $request_uri forwards the
    # full original path+query, so backends keep their /api/... routes verbatim.
    location /api/auth         { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/groups       { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/friends      { set $u http://apiarena-auth:8081;        proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/challenges   { set $u http://apiarena-challenge:8082;   proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/categories   { set $u http://apiarena-challenge:8082;   proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/leaderboard  { set $u http://apiarena-leaderboard:8087; proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/notifications { set $u http://apiarena-notification:8090; proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }
    location /api/metrics      { set $u http://apiarena-metrics:8089;     proxy_pass $u$request_uri; include /etc/nginx/api_proxy.conf; }

    # Submissions: bigger bodies + slow grading runs.
    location /api/submissions  {
        set $u http://apiarena-submission:8083;
        proxy_pass $u$request_uri;
        include /etc/nginx/api_proxy.conf;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Aggregated gateway health (Phase 2): a shell poller refreshes this JSON file
    # every 15s; nginx just serves the static snapshot. No backend dependency, no
    # rate limit, no auth, no sensitive data. Liveness stays at /health below.
    location = /api/gateway/health {
        access_log off;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        alias /var/cache/gateway-health.json;
    }

    # Notifications WebSocket.
    location /ws/notifications {
        set $u http://apiarena-notification:8090;
        proxy_pass $u$request_uri;
        include /etc/nginx/api_proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (container liveness: nginx up, no backend deps).
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Structured JSON for edge failures on /api/* (referenced via error_page in
    # api_proxy.conf). proxy_intercept_errors is left OFF: dead-upstream 502/504 and
    # our own limit_req 429 are nginx-generated and still hit these handlers, while
    # backend-origin bodies (e.g. auth/submission Redis 429) pass through untouched.
    location @api_upstream_error {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 502 '{"error":"upstream_unavailable","status":502,"message":"Service temporarily unavailable. Retry shortly."}';
    }
    location @api_rate_limit {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 429 '{"error":"rate_limited","status":429,"message":"Too many requests. Slow down and retry shortly."}';
    }
}
