# Shared upstream headers for /api proxying.
# X-Forwarded-For / X-Real-IP are required: auth & submission rate limiters key on them.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Edge rate limit (Phase 2). Applies to every /api/* location that includes this
# file. /api/gateway/health serves a static file and does not include it, so it is
# exempt. The WS handshake counts as a single request per connection, so burst 80
# leaves it effectively unaffected. 429s are returned as JSON via error_page below.
limit_req zone=api_edge burst=80 nodelay;
limit_req_status 429;

# Security headers on proxied API responses (JSON APIs, same-origin SPA).
# No CSP and no CORS here on purpose: unnecessary for same-origin JSON.
# Spring Security already emits nosniff + X-Frame-Options; hide its copies so the
# edge owns exactly one of each instead of duplicating them.
proxy_hide_header X-Content-Type-Options;
proxy_hide_header X-Frame-Options;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Structured JSON errors for edge failures (handlers live in nginx.conf server block).
error_page 502 503 504 = @api_upstream_error;
error_page 429 = @api_rate_limit;
