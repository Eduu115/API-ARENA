spring.application.name=metrics-service
server.port=8089

spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=supersecretpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

services.auth-url=http://localhost:8081
# Shared secret required to ingest product events (POST /api/metrics/events)
services.internal-token=

# Optional scheduled BI CSV export (yesterday UTC). Enable in Compose via METRICS_BI_EXPORT_ENABLED=true.
metrics.bi-export.enabled=false
metrics.bi-export.cron=0 0 5 * * *
metrics.bi-export.directory=/app/bi-exports
metrics.bi-export.row-limit=50000
