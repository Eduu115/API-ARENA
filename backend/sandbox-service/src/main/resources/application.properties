# ===========================================
# APPLICATION
# ===========================================
spring.application.name=sandbox-service
server.port=8084

# ===========================================
# DATABASE - PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=supersecretpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# JWT CONFIGURATION (para validar tokens)
# ===========================================
jwt.secret=myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz

# ===========================================
# KAFKA
# ===========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=sandbox-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===========================================
# SANDBOX CONFIGURATION
# ===========================================
sandbox.container.memory-limit=256m
sandbox.container.cpu-limit=1.0
sandbox.container.timeout-seconds=120
sandbox.container.network-disabled=true
sandbox.uploads-dir=/tmp/sandbox-uploads
sandbox.runner.mode=process
sandbox.dind.network=apiarena-network
sandbox.dind.container-port=8080
sandbox.dind.pids-limit=256
sandbox.internal-token=

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# ACTUATOR (Health checks)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===========================================
# LOGGING
# ===========================================
logging.level.com.apiarena.sandboxservice=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================================
# CORS (para frontend)
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
