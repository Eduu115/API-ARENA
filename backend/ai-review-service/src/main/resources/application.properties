spring.application.name=ai-review-service
server.port=8086

ai-review.internal-token=
ai-review.provider=heuristic
ai-review.model=gemini-2.0-flash
ai-review.google-api-key=
ai-review.google-base-url=https://generativelanguage.googleapis.com/v1beta/models
ai-review.timeout-ms=12000

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
