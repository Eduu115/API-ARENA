# ===========================================
# APPLICATION
# ===========================================
spring.application.name=submission-service
server.port=8083

# ===========================================
# DATABASE - PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=supersecretpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# REDIS
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ===========================================
# JWT (validar tokens del auth-service)
# ===========================================
jwt.secret=myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz

# ===========================================
# SUBMISSION
# ===========================================
# Anti-farm: máx. envíos por challenge y día (UTC); cooldown = time_limit_minutes entre intentos.
apiarena.submission.max-attempts-per-day-per-challenge=3
submission.upload-dir=uploads
submission.max-file-size=52428800
submission.redis-ttl-seconds=7200

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# ACTUATOR
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===========================================
# LOGGING
# ===========================================
logging.level.com.apiarena.submissionservice=DEBUG
logging.level.org.springframework.security=DEBUG
# ===========================================
# KAFKA (eventos hacia leaderboard, etc.)
# ===========================================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
apiarena.kafka.topic.submission-completed=apiarena.submissions.completed

# ===========================================
# INTERNAL SERVICE URLS
# ===========================================
services.auth-url=http://localhost:8081
services.challenge-url=http://localhost:8082
services.sandbox-url=http://localhost:8084
services.testing-url=http://localhost:8085
services.candidate-host=localhost

# ===========================================
# CORS
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
