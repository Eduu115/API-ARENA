# ===========================================
# APPLICATION
# ===========================================
spring.application.name=submission-service
server.port=8083

# ===========================================
# DATABASE - PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=supersecretpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# REDIS
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ===========================================
# JWT (validar tokens del auth-service)
# ===========================================
jwt.secret=myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz

# ===========================================
# SUBMISSION
# ===========================================
# Anti-farm: máx. envíos por challenge y día (UTC); cooldown = time_limit_minutes entre intentos.
apiarena.submission.max-attempts-per-day-per-challenge=3

# HTTP rate limiting (Redis burst guard on POST /api/submissions)
apiarena.rate-limit.enabled=true
apiarena.rate-limit.submission-post-per-user-per-minute=4
apiarena.rate-limit.submission-post-per-ip-per-minute=12
# Informational ZIP retention end (createdAt + days) for teacher download UI and X-Zip-Download-Expires-At header.
submission.zip-availability-days=90
submission.upload-dir=uploads
# Upload ZIP limit: 50 MB — room for .git and typical Spring projects without huge binaries.
submission.max-file-size=52428800
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
submission.redis-ttl-seconds=7200
sandbox.runner.mode=process
replay.source=structured
replay.retention.enabled=true
replay.retention-days=30
replay.retention.cron=0 30 3 * * *

# MongoDB mirror for replay (long-term archive after Postgres retention). Docker enables via REPLAY_MONGODB_ENABLED.
replay.mongodb.enabled=${REPLAY_MONGODB_ENABLED:false}
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/apiarena_logs}
spring.data.mongodb.auto-index-creation=true

# InfluxDB 2 — pipeline duration & scores (optional)
influx.enabled=false
influx.url=http://localhost:8086
influx.token=
influx.org=apiarena
influx.bucket=metrics

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# ACTUATOR
# ===========================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.health.mongo.enabled=false

# ===========================================
# LOGGING
# ===========================================
logging.level.com.apiarena.submissionservice=DEBUG
logging.level.org.springframework.security=DEBUG
# ===========================================
# KAFKA (eventos hacia leaderboard, etc.)
# ===========================================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
apiarena.kafka.topic.submission-completed=apiarena.submissions.completed

# ===========================================
# INTERNAL SERVICE URLS
# ===========================================
services.auth-url=http://localhost:8081
services.notification-url=http://localhost:8090
services.challenge-url=http://localhost:8082
services.sandbox-url=http://localhost:8084
services.testing-url=http://localhost:8085
services.ai-review-url=http://localhost:8086
services.candidate-host=localhost
services.internal-token=
ai.review.enabled=false

# ===========================================
# CORS
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
