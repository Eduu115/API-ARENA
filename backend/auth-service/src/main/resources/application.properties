# ===========================================
# APPLICATION
# ===========================================
spring.application.name=auth-service
server.port=8081
# So API clients receive "message" in JSON for ResponseStatusException (e.g. 409 duplicate email)
server.error.include-message=always

# ===========================================
# DATABASE - PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# REDIS
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# ===========================================
# JWT CONFIGURATION
# ===========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# LOGGING
# ===========================================
logging.level.com.apiarena.authservice=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================================
# CORS (para frontend)
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===========================================
# Email verification (Resend)
# ===========================================
# Public SPA URL used in verification links
app.email.frontend-base-url=http://localhost:3000
app.email.from=API Arena <onboarding@resend.dev>
# Leave empty for local dev (link is logged instead)
app.email.resend-api-key=

# ===========================================
# Internal service URLs (Docker: hostnames)
# ===========================================
services.notification-url=http://localhost:8090
services.submission-url=http://localhost:8083
# Shared secret for challenge-service → POST /internal/challenges/new-published
services.internal-token=

# ===========================================
# HTTP rate limiting (Redis, per IP / user)
# ===========================================
apiarena.rate-limit.enabled=true
apiarena.rate-limit.login-per-ip-per-minute=8
apiarena.rate-limit.register-per-ip-per-minute=4
apiarena.rate-limit.refresh-per-ip-per-minute=15
apiarena.rate-limit.forgot-password-per-ip-per-minute=3
apiarena.rate-limit.resend-verification-per-ip-per-minute=3
apiarena.rate-limit.reset-password-per-ip-per-minute=6
apiarena.rate-limit.verify-email-per-ip-per-minute=24
apiarena.rate-limit.public-profile-per-ip-per-minute=120
apiarena.rate-limit.friend-request-per-user-per-hour=30
apiarena.rate-limit.usage-heartbeat-per-user-per-minute=60

# ===========================================
# Cloudflare Turnstile (login / register)
# ===========================================
# When secret is blank, verification is skipped (local dev).
app.turnstile.secret-key=