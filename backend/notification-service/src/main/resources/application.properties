# ===========================================
# APPLICATION
# ===========================================
spring.application.name=notification-service
server.port=8090

# ===========================================
# DATABASE - PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/apiarena
spring.datasource.username=apiarena_user
spring.datasource.password=supersecretpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# JWT (same secret as auth-service; Base64)
# ===========================================
jwt.secret=myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz

# ===========================================
# Internal services (auth: resolve user email for notification emails)
# ===========================================
services.auth-url=${SERVICES_AUTH_URL:http://localhost:8081}

# ===========================================
# KAFKA
# ===========================================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
apiarena.kafka.topic.submission-completed=apiarena.submissions.completed

# ===========================================
# SWAGGER / OPENAPI
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# ACTUATOR
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===========================================
# LOGGING
# ===========================================
logging.level.com.apiarena.notificationservice=DEBUG
logging.level.org.springframework.security=INFO

# ===========================================
# CORS
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
