services:
  postgres:
    image: postgres:16-alpine
    container_name: apiarena-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${BIND_IP:-0.0.0.0}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - apiarena-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apiarena-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${BIND_IP:-0.0.0.0}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - apiarena-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: apiarena-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${BIND_IP:-0.0.0.0}:${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - apiarena-network
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: apiarena-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    ports:
      - "${BIND_IP:-0.0.0.0}:${INFLUX_HOST_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - apiarena-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: apiarena-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - apiarena-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: apiarena-kafka
    depends_on:
      - zookeeper
    ports:
      - "${BIND_IP:-0.0.0.0}:${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - apiarena-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: apiarena-auth
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_EMAIL_FRONTEND_BASE_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_EMAIL_RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-API Arena <onboarding@resend.dev>}
      SERVICES_NOTIFICATION_URL: http://apiarena-notification:8090
      SERVICES_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${AUTH_HOST_PORT:-8081}:8081"
    networks:
      - apiarena-network
    restart: unless-stopped

  challenge-service:
    build:
      context: ./backend/challenge-service
      dockerfile: Dockerfile
    container_name: apiarena-challenge
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SERVICES_AUTH_URL: http://apiarena-auth:8081
      SERVICES_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${CHALLENGE_HOST_PORT:-8082}:8082"
    networks:
      - apiarena-network
    restart: unless-stopped

  submission-service:
    build:
      context: ./backend/submission-service
      dockerfile: Dockerfile
    container_name: apiarena-submission
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongodb: { condition: service_started }
      influxdb: { condition: service_started }
      kafka: { condition: service_started }
      sandbox-service: { condition: service_started }
      testing-service: { condition: service_started }
      ai-review-service: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SERVICES_AUTH_URL: http://apiarena-auth:8081
      SERVICES_NOTIFICATION_URL: http://apiarena-notification:8090
      SERVICES_CHALLENGE_URL: http://apiarena-challenge:8082
      SERVICES_SANDBOX_URL: http://apiarena-sandbox:8084
      SERVICES_TESTING_URL: http://apiarena-testing:8085
      SERVICES_AI_REVIEW_URL: http://apiarena-ai-review:8086
      SERVICES_CANDIDATE_HOST: apiarena-sandbox
      SERVICES_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      AI_REVIEW_ENABLED: ${AI_REVIEW_ENABLED:-true}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      REPLAY_MONGODB_ENABLED: ${REPLAY_MONGODB_ENABLED:-true}
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      INFLUX_ENABLED: ${INFLUX_ENABLED:-true}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
    volumes:
      - submission_uploads:/app/uploads
    ports:
      - "${BIND_IP:-0.0.0.0}:${SUBMISSION_HOST_PORT:-8083}:8083"
    networks:
      - apiarena-network
    restart: unless-stopped

  sandbox-service:
    build:
      context: ./backend/sandbox-service
      dockerfile: Dockerfile
    container_name: apiarena-sandbox
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SANDBOX_RUNNER_MODE: ${SANDBOX_RUNNER_MODE:-dind}
      # Isolated bridge: candidate cannot reach postgres/redis/kafka; sandbox + testing are on both networks.
      SANDBOX_DIND_NETWORK: ${COMPOSE_PROJECT_NAME:-api-arena}_apiarena-candidate
      SANDBOX_DIND_CONTAINER_PORT: "8080"
      SANDBOX_DIND_PIDS_LIMIT: "256"
      SANDBOX_DIND_USE_INIT: ${SANDBOX_DIND_USE_INIT:-true}
      SANDBOX_DIND_NOFILE_ULIMIT: ${SANDBOX_DIND_NOFILE_ULIMIT:-8192:8192}
      SANDBOX_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${SANDBOX_HOST_PORT:-8084}:8084"
    volumes:
      - submission_uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - apiarena-network
      - apiarena-candidate
    restart: unless-stopped

  ai-review-service:
    build:
      context: ./backend/ai-review-service
      dockerfile: Dockerfile
    container_name: apiarena-ai-review
    environment:
      AI_REVIEW_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      AI_REVIEW_PROVIDER: ${AI_REVIEW_PROVIDER:-heuristic}
      AI_REVIEW_MODEL: ${AI_REVIEW_MODEL:-gemini-2.0-flash}
      AI_REVIEW_GOOGLE_API_KEY: ${AI_REVIEW_GOOGLE_API_KEY:-}
      AI_REVIEW_TIMEOUT_MS: ${AI_REVIEW_TIMEOUT_MS:-12000}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${AI_REVIEW_HOST_PORT:-8186}:8086"
    networks:
      - apiarena-network
    restart: unless-stopped

  testing-service:
    build:
      context: ./backend/testing-service
      dockerfile: Dockerfile
    container_name: apiarena-testing
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TESTING_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-apiarena-internal-token}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${TESTING_HOST_PORT:-8085}:8085"
    networks:
      - apiarena-network
      - apiarena-candidate
    restart: unless-stopped

  leaderboard-service:
    build:
      context: ./backend/leaderboard-service
      dockerfile: Dockerfile
    container_name: apiarena-leaderboard
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${LEADERBOARD_HOST_PORT:-8087}:8087"
    networks:
      - apiarena-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: apiarena-notification
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICES_AUTH_URL: http://apiarena-auth:8081
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    ports:
      - "${BIND_IP:-0.0.0.0}:${NOTIFICATION_HOST_PORT:-8090}:8090"
    networks:
      - apiarena-network
    restart: unless-stopped

  metrics-service:
    build:
      context: ./backend/metrics-service
      dockerfile: Dockerfile
    container_name: apiarena-metrics
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiarena}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICES_AUTH_URL: http://apiarena-auth:8081
      JWT_SECRET: ${JWT_SECRET:-myjwtsecretkey123456789abcdefghijklmnopqrstuvwxyz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      METRICS_BI_EXPORT_ENABLED: ${METRICS_BI_EXPORT_ENABLED:-false}
      METRICS_BI_EXPORT_CRON: ${METRICS_BI_EXPORT_CRON:-0 0 5 * * *}
      METRICS_BI_EXPORT_DIRECTORY: /app/bi-exports
    ports:
      - "${BIND_IP:-0.0.0.0}:${METRICS_HOST_PORT:-8089}:8089"
    volumes:
      - metrics_bi_exports:/app/bi-exports
    networks:
      - apiarena-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: apiarena-prometheus
    depends_on:
      - metrics-service
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "${BIND_IP:-0.0.0.0}:${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - apiarena-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: apiarena-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${BIND_IP:-0.0.0.0}:${ALERTMANAGER_HOST_PORT:-9093}:9093"
    networks:
      - apiarena-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: apiarena-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/realtime-overview.json:/var/lib/grafana/dashboards/realtime-overview.json:ro
      - ./docker/grafana/pipeline-submissions.json:/var/lib/grafana/dashboards/pipeline-submissions.json:ro
    ports:
      - "${BIND_IP:-0.0.0.0}:${GRAFANA_HOST_PORT:-3001}:3000"
    networks:
      - apiarena-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:8081}
        VITE_CHALLENGES_API_URL: ${VITE_CHALLENGES_API_URL:-http://localhost:8082}
        VITE_SUBMISSIONS_API_URL: ${VITE_SUBMISSIONS_API_URL:-http://localhost:8083}
        VITE_LEADERBOARD_API_URL: ${VITE_LEADERBOARD_API_URL:-http://localhost:8087}
        VITE_NOTIFICATIONS_API_URL: ${VITE_NOTIFICATIONS_API_URL:-http://localhost:8090}
        VITE_METRICS_API_URL: ${VITE_METRICS_API_URL:-http://localhost:8089}
    container_name: apiarena-frontend
    depends_on:
      - auth-service
      - challenge-service
    ports:
      - "${BIND_IP:-0.0.0.0}:${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - apiarena-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production

networks:
  apiarena-network:
    driver: bridge
  apiarena-candidate:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  influxdb_data:
  submission_uploads:
  grafana_data:
  metrics_bi_exports:
