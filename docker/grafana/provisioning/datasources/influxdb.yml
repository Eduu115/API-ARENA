apiVersion: 1

# Token must match INFLUX_TOKEN in .env (default dev token in .env.example).
# Override via env substitution if you templating this file at deploy time.
datasources:
  - name: InfluxDB
    uid: influx-apiarena
    orgId: 1
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    editable: false
    jsonData:
      version: Flux
      organization: apiarena
      defaultBucket: metrics
      tlsSkipVerify: true
    secureJsonData:
      token: myinfluxtoken112233445566
