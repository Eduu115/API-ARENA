global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-auth:8081"]
  - job_name: challenge-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-challenge:8082"]
  - job_name: submission-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-submission:8083"]
  - job_name: sandbox-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-sandbox:8084"]
  - job_name: testing-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-testing:8085"]
  - job_name: leaderboard-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-leaderboard:8087"]
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-notification:8090"]
  - job_name: metrics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-metrics:8089"]
  - job_name: ai-review-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["apiarena-ai-review:8086"]
