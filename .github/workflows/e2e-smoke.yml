name: E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for core services
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            docker compose ps
            auth_ok=0
            sub_ok=0
            curl -fsS http://localhost:8081/actuator/health >/dev/null 2>&1 && auth_ok=1 || true
            curl -fsS http://localhost:8083/actuator/health >/dev/null 2>&1 && sub_ok=1 || true
            if [ "$auth_ok" = "1" ] && [ "$sub_ok" = "1" ]; then
              echo "Auth and submission-service are healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for auth/submission health" >&2
          exit 1

      - name: Run e2e smoke script
        run: chmod +x ./scripts/e2e-smoke.sh && ./scripts/e2e-smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-compose-logs.txt

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose-logs.txt

      - name: Stop stack
        if: always()
        run: docker compose down -v
